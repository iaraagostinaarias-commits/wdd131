<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temple Album</title>
    <meta name="description" content="A photo album of various temples of the Church of Jesus Christ.">
    <meta name="author" content="Iara Agostina Arias">
    <link rel="stylesheet" href="styles/temples.css">
    <link rel="stylesheet" href="styles/temples-large.css">
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/temples.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz@14..32&family=Playfair+Display&display=swap"
        rel="stylesheet">
</head>

<body>
    <header>
        <span>Temple Album</span>

        <button id="menuBtn"></button>
        <nav>
            <ul>
                <li><a href="#">Home</a></li>
                <li><a href="#">Old</a></li>
                <li><a href="#">New</a></li>
                <li><a href="#">Large</a></li>
                <li><a href="#">Small</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <h1>Home</h1>

        <div class="container">
            <figure>
                <img src="images/bsas-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Buenos Aires Argentina during the day." width="250"
                    height="160">
                <figcaption>Buenos Aires, Argentina</figcaption>
            </figure>
            <figure>
                <img src="images/cordoba-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Córdoba, Argentina during the afternoon." width="250"
                    height="160">
                <figcaption>Córdoba, Argentina</figcaption>
            </figure>
            <figure>
                <img src="images/mendoza-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Mendoza, Argentina during the afternoon." width="250"
                    height="160">
                <figcaption>Mendoza, Argentina</figcaption>
            </figure>
            <figure>
                <img src="images/salta-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Salta Argentina during the day." width="250"
                    height="160">
                <figcaption>Salta, Argentina</figcaption>
            </figure>
            <figure>
                <img src="images/quito-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Quito, Ecuador during the night." width="250"
                    height="150">
                <figcaption>Quito, Ecuador</figcaption>
            </figure>
            <figure>
                <img src="images/recife-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Recife, Brazil during the night." width="250"
                    height="160">
                <figcaption>Recife, Brazil</figcaption>
            </figure>
            <figure>
                <img src="images/portoalegre-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Porto Alegre, Brazil during the day." width="250"
                    height="160">
                <figcaption>Porto Alegre, Brazil</figcaption>
            </figure>
            <figure>
                <img src="images/arizona-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Gilber, Arizona during the afternoon." width="250"
                    height="160">
                <figcaption>Gilber Arizona, USA</figcaption>
            </figure>
            <figure>
                <img src="images/seoul-small.jpg"
                    alt="Temple of the Church of Jesus Christ in Seoul, Corea during the day." width="250" height="160">
                <figcaption>Seoul, Corea</figcaption>
            </figure>
        </div>
    </main>

    <footer>
        <p><span id="currentYear"></span></p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
