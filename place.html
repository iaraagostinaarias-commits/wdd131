<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 - Neuquén, Argentina</title>
    <meta name="description"
        content="Information about the province of Neuquén, Argentina, its climatic conditions, and representative images of the place.">
    <meta name="author" content="Iara Agostina Arias">
    <link rel="stylesheet" href="styles/place.css">
    <script src="scripts/getdates.js" defer></script>
    <script src="scripts/place.js" defer></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Neuquen, Argentina</h1>
    </header>

    <main>
        <div class="hero">
            <picture>
                <source srcset="images/arg3.webp" media="(min-width: 768px)">
                <img src="images/arg1.webp" alt="" width="1200">
            </picture>

            <section class="data">
                <h2>Data</h2>

                <p><strong>Area: </strong>94,078 sq km</p>
                <p><strong>Population: </strong>793,288</p>
                <p><strong>Capital: </strong>Neuquen</p>
                <p><strong>Languages: </strong>Spanish</p>
                <p><strong>Currency: </strong>Argentine peso (ARS)</p>
                <p><strong>Time Zone: </strong>UTC-3</p>
                <p><strong>Calling Code: </strong>+54</p>
                <p><strong>Internet TDL: </strong>.ar</p>
            </section>

            <section class="weather">
                <h2>Weather</h2>

                <img src="images/weather-sun.svg" alt="An icon of a sun and a cloud." width="70" class="icon">
                <p><strong>Temperature: </strong><span id="temperature"></span></p>
                <p><strong>Conditions: </strong>Partly Cloudy</p>
                <p><strong>Wind: </strong><span id="windSpeed"></span></p>
                <p><strong>Wind Chill: </strong><span id="windChill"></span></p>
            </section>
        </div>
    </main>

    <footer>
        <p><span id="currentyear"></span></p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
